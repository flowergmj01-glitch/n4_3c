    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-bounce-short { animation: bounce-short 0.5s ease-in-out 2; }
    
    @keyframes fade-in {

      to { opacity: 1; transform: translateY(0); }
    }

      to { transform: rotate(360deg); }
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;

  function renderGrammarQuiz(data, pageIndex) {
    const state = grammarQuizStates[pageIndex];
    let questionsHtml = data.questions.map((q, qIdx) => {

        let btnClass = "w-full md:flex-1 text-center py-2.5 px-3 rounded-xl border-2 font-bold transition-all ";
        let iconHtml = '';
        const isSelected = state.answers[qIdx] === oIdx;
        const isCorrect = q.ans === oIdx;
        const hasAnswered = state.answers[qIdx] !== null;

        if (hasAnswered) {
          if (isCorrect) {
            btnClass += "bg-lime-100 border-lime-500 text-lime-800 shadow-sm ";
            iconHtml = '<i class="fa-solid fa-check ml-1 text-lime-500"></i>';
          } else if (isSelected) {
            btnClass += "bg-rose-100 border-rose-500 text-rose-800 ";
            iconHtml = '<i class="fa-solid fa-xmark ml-1 text-rose-500"></i>';
          } else {
            btnClass += "bg-gray-50 border-gray-200 text-gray-400 opacity-50 ";
          }
        } else {
          btnClass += "bg-white border-blue-200 hover:bg-blue-50 text-blue-800 cursor-pointer hover:border-blue-400 active:scale-95 ";
        }

        return `<button onclick="handleGrammarQuizSelect(${pageIndex}, ${qIdx}, ${oIdx})" ${hasAnswered ? 'disabled' : ''} class="${btnClass}">
                  ${parseText(opt)}${iconHtml}
                </button>`;
      }).join('');

      let expHtml = '';
      if (state.answers[qIdx] !== null) {
          const correct = state.answers[qIdx] === q.ans;

      }

      rightPanelHtml = `
        <div class="bg-white p-6 md:p-8 rounded-[2rem] border-[6px] border-orange-300 shadow-[6px_6px_0_#fdba74] animate-fade-in relative w-full flex flex-col">
          <div class="absolute -top-5 left-6 bg-rose-500 text-white px-4 py-1.5 rounded-full font-black text-lg border-2 border-white transform -rotate-3">
            📝 問題
          </div>
          <div class="text-xl md:text-2xl font-black text-gray-800 mb-6 mt-4 leading-loose border-b-2 border-dashed border-orange-200 pb-4 text-center">
            ${parseText(data.question.text)}
          </div>
          <div class="space-y-3 flex-1">
            ${optionsHtml}
          </div>
          ${resultBox}
        </div>
      `;
    }

    return `
      <div class="min-h-full w-full flex flex-col md:flex-row items-center justify-center bg-[#fff8e7] p-6 md:p-8 gap-8 md:gap-12 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#f59e0b 2px, transparent 2px); background-size: 30px 30px;"></div>
        
        <!-- Left: Gacha Machine -->
        <div class="flex-shrink-0 flex flex-col items-center z-10 w-full md:w-auto mt-4 md:mt-0">
          <div class="w-48 h-48 md:w-56 md:h-56 rounded-t-full border-[8px] md:border-[10px] border-orange-400 bg-sky-100 relative overflow-hidden flex flex-wrap justify-center content-end pb-3 gap-1 shadow-inner">
             ${[...Array(8)].map((_, i) => `<div class="w-10 h-10 md:w-12 md:h-12 rounded-full shadow-md border-[3px] border-white/60 ${['bg-rose-400', 'bg-sky-400', 'bg-amber-400', 'bg-lime-400', 'bg-fuchsia-400'][i%5]} ${state.stage === 'spinning' ? 'animate-bounce' : ''}" style="animation-delay: ${i*0.1}s"></div>`).join('')}
          </div>
          <div class="w-56 h-48 md:w-64 md:h-56 bg-orange-500 rounded-b-[2rem] border-[8px] md:border-[10px] border-t-0 border-orange-400 relative shadow-[0_8px_0_#c2410c] flex flex-col items-center pt-6 space-y-4 md:space-y-6 ${state.stage === 'spinning' ? 'animate-pulse' : ''}">
             <button onclick="handleGachaPush(${pageIndex})" ${state.stage !== 'idle' ? 'disabled' : ''} class="group flex flex-col items-center transition-transform active:scale-90 disabled:opacity-50 z-20">
                <div class="w-16 h-16 md:w-20 md:h-20 bg-yellow-300 rounded-full border-[6px] border-yellow-500 shadow-[0_6px_0_#b45309] flex items-center justify-center ${state.stage === 'spinning' ? 'animate-spin-slow' : ''}">
                   <i class="fa-solid fa-coins text-3xl md:text-4xl text-orange-700"></i>
                </div>
                ${state.stage === 'idle' ? `<span class="mt-3 md:mt-4 font-black text-white bg-red-500 px-4 py-1.5 rounded-full shadow-sm text-sm md:text-base border-2 border-white animate-bounce">PUSH!</span>` : ''}
             </button>
             <div class="w-20 h-16 md:w-24 md:h-16 bg-gray-800 rounded-t-2xl absolute bottom-0 shadow-inner flex justify-center items-end pb-2 border-[4px] border-b-0 border-gray-600">
                ${(state.stage === 'question' || state.stage === 'result') ? `<div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-rose-400 border-[3px] border-white shadow-sm animate-bounce absolute -bottom-3"></div>` : ''}
             </div>
          </div>
        </div>

        <!-- Right: Question Area -->
        <div class="w-full max-w-lg z-10">
          ${rightPanelHtml}
        </div>
      </div>
    `;
  }

  // --- UI Update ---
  function updateUI() {
    const data = pagesData[currentPage];
    
    let iconClass = 'fa-book';
    if (data.type === 'dialogue') iconClass = 'fa-comments';
    if (data.type === 'gacha') iconClass = 'fa-gamepad';
    if (data.type === 'grammar_quiz') iconClass = 'fa-list-check';
    
    pageTitle.innerHTML = `<i class="fa-solid ${iconClass}"></i> ${data.title}`;
    currentPageNum.textContent = currentPage + 1;
    totalPageNum.textContent = totalPages;

    btnPrev.disabled = currentPage === 0;
    btnNext.disabled = currentPage === totalPages - 1;

    // Build Dots (縮小尺寸以容納 28 頁)
    dotsContainer.innerHTML = pagesData.map((_, idx) => `
      <button onclick="goToPage(${idx})" class="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-all border-2 ${currentPage === idx ? 'bg-rose-400 border-rose-500 scale-125' : 'bg-rose-100 border-rose-200 hover:bg-rose-300'}"></button>
    `).join('');

    // Render Content
    if (data.type === 'dialogue') {
      appContent.innerHTML = renderDialogue(data);
    } else if (data.type === 'grammar') {
      appContent.innerHTML = renderGrammar(data);
    } else if (data.type === 'grammar_quiz') {
      appContent.innerHTML = renderGrammarQuiz(data, currentPage);
    } else if (data.type === 'gacha') {
      appContent.innerHTML = renderGacha(data, currentPage);
    }

    // Scroll top
    appContent.scrollTop = 0;
  }

  // --- Actions ---
  window.goToPage = function(idx) {
    currentPage = idx;
    stopConfetti();
    updateUI();
  }

  window.toggleTranslation = function(btn) {
    const div = btn.nextElementSibling;
    div.classList.toggle('hidden');
    if(div.classList.contains('hidden')){
      btn.innerHTML = '<i class="fa-solid fa-eye mr-1"></i> 顯示中文';
    } else {
      btn.innerHTML = '<i class="fa-solid fa-eye-slash mr-1"></i> 隱藏中文';
    }
  }

  // 新增：對話框翻譯開關邏輯
  window.toggleDialogueTranslation = function(btn) {
    const div = btn.previousElementSibling; 
    div.classList.toggle('hidden');
    if(div.classList.contains('hidden')){
      btn.innerHTML = '<i class="fa-solid fa-language"></i> 中文翻譯';
    } else {
      btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> 隱藏翻譯';
    }
  }

  // 新增：選擇題點擊邏輯
  window.handleGrammarQuizSelect = function(pageIndex, qIdx, optIdx) {
    const state = grammarQuizStates[pageIndex];
    if (state.answers[qIdx] !== null) return; // already answered
    state.answers[qIdx] = optIdx;
    
    // Check if all answered correctly to maybe trigger confetti
    const quizData = pagesData[pageIndex];
    const allCorrect = quizData.questions.every((q, idx) => state.answers[idx] === q.ans);
    const allAnswered = state.answers.every(a => a !== null);
    
    if (allAnswered && allCorrect) {
        startConfetti();
    }
    
    updateUI();
  }

  window.handleGachaPush = function(pageIndex) {
    if(gachaStates[pageIndex].stage !== 'idle') return;
    gachaStates[pageIndex].stage = 'spinning';
    updateUI();
    
    setTimeout(() => {
      gachaStates[pageIndex].stage = 'question';
      updateUI();
    }, 1500);
  }

  window.handleGachaSelect = function(pageIndex, optIdx) {
    const state = gachaStates[pageIndex];
    if (state.stage === 'result') return;
    
    state.selected = optIdx;
    state.stage = 'result';
    
    if (optIdx === pagesData[pageIndex].question.correctIndex) {
      startConfetti();
    }
    updateUI();
  }

  btnPrev.addEventListener('click', () => {
    if (currentPage > 0) goToPage(currentPage - 1);
  });

  btnNext.addEventListener('click', () => {
    if (currentPage < totalPages - 1) goToPage(currentPage + 1);
  });


  // --- Confetti Logic ---
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let confettiParticles = [];
  let animationId = null;
  let isConfettiActive = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function startConfetti() {
    isConfettiActive = true;
    confettiParticles = Array.from({ length: 150 }).map(() => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      vx: (Math.random() - 0.5) * 8,
      vy: Math.random() * 4 + 3,
      color: `hsl(${Math.random() * 360}, 100%, 65%)`,
      size: Math.random() * 12 + 6,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 15,
      type: Math.random() > 0.5 ? 'rect' : 'circle'
    }));

    if (!animationId) renderConfetti();
  }

  function stopConfetti() {
    isConfettiActive = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  }

  function renderConfetti() {
    if (!isConfettiActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    confettiParticles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      if (p.y > canvas.height) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rot * Math.PI) / 180);
      ctx.fillStyle = p.color;
      if (p.type === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
    animationId = requestAnimationFrame(renderConfetti);
  }

  // Initialize
  updateUI();
</script>
</body>
</html>
